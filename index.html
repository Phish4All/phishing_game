<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Phishing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- WELCOME SCREEN -->
  <div id="screen-welcome" class="screen active">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="fr">🇫🇷 FR</button>
      <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
      <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
    </div>
    <div class="container">
      <div class="welcome-card">
        <div class="shield-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
        <h1 class="welcome-title">The Phishing Game</h1>
        <p class="welcome-subtitle" data-i18n="subtitle"></p>
        <div class="welcome-stats">
          <div class="stat-chip">
            <span class="stat-num">10</span>
            <span class="stat-label" data-i18n="questions_count"></span>
          </div>
          <div class="stat-chip">
            <span class="stat-num">~5</span>
            <span class="stat-label" data-i18n="minutes"></span>
          </div>
          <div class="stat-chip">
            <span class="stat-num">3</span>
            <span class="stat-label" data-i18n="langs"></span>
          </div>
        </div>
        <button class="btn-primary btn-full" id="btn-start" data-i18n="start_btn"></button>
        <div class="brought-by">
          <span data-i18n="brought_by"></span>
          <a href="https://www.phish4all.com" target="_blank" rel="noopener">
            <img src="logo_white.svg" alt="Phish4All" class="p4a-logo">
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <div class="progress-label">
        <span data-i18n="question_label"></span>&nbsp;<span id="q-num">1</span>/<span id="q-total">10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="score-pill">⭐ <span id="score-live">0</span></div>
    </header>

    <div class="container quiz-body">
      <div id="question-area"></div>

      <div id="feedback-box" class="feedback-box hidden">
        <div class="fb-top">
          <span class="fb-icon" id="fb-icon"></span>
          <div class="fb-content">
            <strong id="fb-title"></strong>
            <p id="fb-text"></p>
          </div>
        </div>
        <div id="fb-flags" class="fb-flags"></div>
        <button class="btn-primary" id="btn-next"></button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="container">
      <div class="result-card">
        <h2 class="result-heading" data-i18n="result_title"></h2>

        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
            <defs>
              <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e8491d"/>
                <stop offset="100%" stop-color="#ff7043"/>
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="60" cy="60" r="50"/>
            <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="50" stroke="url(#ring-grad)"/>
          </svg>
          <div class="ring-label">
            <span id="final-score">0</span><small>/<span id="final-total">10</span></small>
          </div>
        </div>

        <div id="grade-badge" class="grade-badge"></div>
        <p id="grade-desc" class="grade-desc"></p>

        <div class="tips-box">
          <h3 data-i18n="tips_title"></h3>
          <ul id="tips-list"></ul>
        </div>

        <div class="result-actions">
          <button class="btn-primary" id="btn-retry" data-i18n="retry_btn"></button>
          <button class="btn-outline" id="btn-home" data-i18n="home_btn"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/locales.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
