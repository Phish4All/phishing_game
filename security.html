<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Évaluer ma sécurité</title>
  <link rel="stylesheet" href="css/style.css">
  <script>if(new URLSearchParams(location.search).get('embed')==='1')document.documentElement.classList.add('embed-mode');</script>
</head>
<body>

  <div class="lang-bar" style="padding:12px;gap:8px;justify-content:flex-end;">
    <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
  </div>

  <div class="container">
    <div class="welcome-card" style="max-width:720px;margin:48px auto;">
      <h1 class="welcome-title">Évaluez votre protection en ligne</h1>
      <p class="welcome-subtitle">Répondez rapidement à ces questions pour mesurer votre niveau de protection.</p>

      <div id="sec-questions" class="sec-questions">
        <!-- questions rendered by js/security.js -->
      </div>

      <div style="margin-top:20px;">
        <button class="btn-primary" id="btn-submit">Voir mes conseils</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span class="footer-title" id="footer-title">Le Jeu du Phishing</span>
    <span class="footer-sep">·</span>
    <span class="footer-by" id="footer-brought">Proposé par</span>
    <a href="https://www.phish4all.com" target="_blank" rel="noopener" class="footer-logo-link">
      <img src="assets/logo_white.svg" alt="Phish4All" class="p4a-logo">
    </a>
    <span class="footer-sep">·</span>
    <a id="link-home" href="index.html" class="footer-link">Retour au quiz</a>
  </footer>

  <script src="js/locales.js"></script>
  <script src="js/security.js"></script>

</html>
